<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banking Dashboard</title>

  <!-- Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Our own stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="brand">🏦 PK Bank</div>
    <div class="user-info">Welcome back, <strong>Pawan</strong></div>
  </header>

  <!-- KPI CARDS -->
  <section class="kpi-grid">

    <div class="card">
      <div class="card-label">Total Balance</div>
      <div class="card-value">$124,500</div>
      <div class="card-sub">↑ 3.2% this month</div>
    </div>

    <div class="card">
      <div class="card-label">Monthly Spend</div>
      <div class="card-value">$4,280</div>
      <div class="card-sub">↓ 8% vs last month</div>
    </div>

    <div class="card">
      <div class="card-label">Savings Rate</div>
      <div class="card-value">18.4%</div>
      <div class="card-sub">↑ Target: 20%</div>
    </div>

    <div class="card highlight">
      <div class="card-label">Credit Score</div>
      <div class="card-value">782</div>
      <div class="card-sub">⭐ Excellent</div>
    </div>

  </section>

  <!-- CHART -->
  <section class="chart-section">
    <h2>Monthly Spending — Last 6 Months</h2>
    <canvas id="spendingChart"></canvas>
  </section>

  <!-- TRANSACTIONS -->
  <section class="transactions">
    <h2>Recent Transactions</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="txn-body">
        <!-- Filled by app.js -->
      </tbody>
    </table>
  </section>

  <!-- Our own script -->
  <script src="app.js"></script>

</body>
</html>
